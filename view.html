<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปการชำระหนี้</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');
  :root {
    --green:#1D9E75; --green-light:#E1F5EE; --green-dark:#0F6E56;
    --gray-100:#F6F6F4; --gray-200:#ECEAE5;
    --gray-400:#B4B2A9; --gray-600:#5F5E5A; --gray-900:#2C2C2A;
    --red:#D85A30; --radius:14px; --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sarabun',sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;padding-bottom:3rem}

  /* Header */
  .header{background:#fff;border-bottom:1px solid var(--gray-200);padding:1.1rem 1.5rem;position:sticky;top:0;z-index:20}
  .header-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--green)}
  .header-badge{font-size:11px;background:var(--green-light);color:var(--green-dark);padding:3px 10px;border-radius:99px;font-weight:500}
  .btn-icon{background:none;border:none;cursor:pointer;color:var(--gray-400);padding:6px;border-radius:50%;display:flex;transition:color .15s,background .15s}
  .btn-icon:hover{color:var(--green);background:var(--green-light)}

  /* Main */
  .main{max-width:480px;margin:0 auto;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:1rem}
  .card{background:#fff;border-radius:var(--radius);border:1px solid var(--gray-200);padding:1.25rem 1.5rem}

  /* Hero progress */
  .hero-card{padding:2rem 1.5rem 1.5rem;text-align:center}
  .hero-names{font-size:13px;color:var(--gray-400);margin-bottom:1.5rem;line-height:1.6}
  .hero-names strong{color:var(--gray-700,#454542);font-weight:600}

  /* Circle */
  .circle-wrap{width:160px;height:160px;margin:0 auto 1.5rem;position:relative}
  .circle-svg{transform:rotate(-90deg)}
  .circle-bg{fill:none;stroke:var(--gray-200);stroke-width:10}
  .circle-prog{fill:none;stroke:var(--green);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1)}
  .circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
  .circle-pct{font-size:34px;font-weight:600;line-height:1;color:var(--gray-900)}
  .circle-sub{font-size:12px;color:var(--gray-400);margin-top:3px}

  /* Amount summary row */
  .summary-grid{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;background:var(--gray-100);border-radius:var(--radius-sm);overflow:hidden}
  .summary-cell{padding:.75rem .5rem;text-align:center}
  .summary-div{background:var(--gray-200)}
  .summary-label{font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
  .summary-value{font-size:16px;font-weight:600}
  .summary-value.green{color:var(--green)}
  .summary-value.red{color:var(--red)}
  .summary-value.gray{color:var(--gray-600)}

  /* Last payment strip */
  .last-payment{margin-top:1rem;background:var(--green-light);border-radius:var(--radius-sm);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .last-payment-label{font-size:12px;color:var(--green-dark)}
  .last-payment-amount{font-size:15px;font-weight:600;color:var(--green-dark)}
  .last-payment-date{font-size:11px;color:var(--green-dark);opacity:.7;margin-top:1px}

  /* Section label */
  .section-label{font-size:11px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}

  /* History */
  .history-item{border-bottom:1px solid var(--gray-100)}
  .history-item:last-child{border-bottom:none}
  .history-summary{display:flex;align-items:center;gap:12px;padding:13px 0;cursor:pointer;user-select:none}
  .history-summary:hover .h-amount{color:var(--green)}
  .h-dot{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0}
  .h-info{flex:1;min-width:0}
  .h-top{display:flex;justify-content:space-between;align-items:baseline;gap:6px}
  .h-amount{font-size:16px;font-weight:600;color:var(--green-dark);transition:color .15s}
  .h-date{font-size:12px;color:var(--gray-400);white-space:nowrap}
  .h-note-preview{font-size:13px;color:var(--gray-400);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .h-chevron{font-size:11px;color:var(--gray-400);flex-shrink:0;transition:transform .2s}
  .h-chevron.open{transform:rotate(180deg)}
  .badge-slip{display:inline-block;background:var(--green-light);color:var(--green-dark);font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;margin-left:4px;vertical-align:middle}

  /* Detail */
  .h-detail{display:none;padding:2px 0 14px 22px;animation:slideDown .2s ease}
  .h-detail.open{display:block}
  @keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .d-row{display:flex;gap:8px;font-size:13px;margin-bottom:8px;align-items:flex-start}
  .d-row:last-child{margin-bottom:0}
  .d-label{color:var(--gray-400);min-width:56px;flex-shrink:0}
  .d-value{color:var(--gray-900);line-height:1.5}
  .slip-thumb{max-width:100%;max-height:240px;border-radius:var(--radius-sm);margin-top:8px;border:1px solid var(--gray-200);display:block;cursor:zoom-in}
  .slip-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--green);font-weight:500;text-decoration:none;margin-top:6px}
  .slip-link:hover{color:var(--green-dark);text-decoration:underline}

  /* Running total chip */
  .running-chip{display:inline-block;font-size:11px;color:var(--gray-400);background:var(--gray-100);border-radius:99px;padding:2px 8px;margin-top:4px}

  /* Loading / Empty */
  .loading{text-align:center;padding:2.5rem;color:var(--gray-400);font-size:14px}
  .spinner{width:26px;height:26px;border:2px solid var(--gray-200);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:2.5rem;color:var(--gray-400);font-size:14px}

  /* Lightbox */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:10px;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:92vw;max-height:86vh;border-radius:var(--radius-sm)}
  .lightbox-hint{font-size:12px;color:rgba(255,255,255,.45)}

  /* Footer note */
  .footer-note{text-align:center;font-size:12px;color:var(--gray-400);padding-top:.5rem}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-title">
      <div class="dot"></div>
      สรุปการชำระหนี้
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="header-badge">👁 มุมมองผู้ให้ยืม</span>
      <button class="btn-icon" onclick="loadData()" title="รีเฟรช">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="main">

  <!-- Hero progress -->
  <div class="card hero-card">
    <div class="hero-names" id="hero-names">กำลังโหลด...</div>
    <div class="circle-wrap">
      <svg class="circle-svg" width="160" height="160" viewBox="0 0 160 160">
        <circle class="circle-bg" cx="80" cy="80" r="70"/>
        <circle class="circle-prog" id="circle-prog" cx="80" cy="80" r="70"
          stroke-dasharray="439.82" stroke-dashoffset="439.82"/>
      </svg>
      <div class="circle-text">
        <div class="circle-pct" id="pct-text">0%</div>
        <div class="circle-sub">ชำระแล้ว</div>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-cell">
        <div class="summary-label">ยืมทั้งหมด</div>
        <div class="summary-value gray" id="total-amount">฿0</div>
      </div>
      <div class="summary-div"></div>
      <div class="summary-cell">
        <div class="summary-label">ชำระแล้ว</div>
        <div class="summary-value green" id="paid-amount">฿0</div>
      </div>
      <div class="summary-div"></div>
      <div class="summary-cell">
        <div class="summary-label">คงเหลือ</div>
        <div class="summary-value red" id="remain-amount">฿0</div>
      </div>
    </div>

    <div class="last-payment" id="last-payment" style="display:none">
      <div>
        <div class="last-payment-label">ชำระล่าสุด</div>
        <div class="last-payment-date" id="last-date"></div>
      </div>
      <div class="last-payment-amount" id="last-amount"></div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="section-label">ประวัติการชำระทั้งหมด</div>
    <div id="history-container">
      <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
    </div>
  </div>

  <div class="footer-note" id="footer-note"></div>

</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="สลิป"/>
  <div class="lightbox-hint">แตะเพื่อปิด</div>
</div>

<script>
const API = 'https://royal-flower-a765.supanutmilung.workers.dev/';
// const API = 'https://script.google.com/macros/s/AKfycbxbSz8r4IP3ZdO28eiiOb5MpQSNgCxUdAtzvGlZ5HluFMjbcHf54QEwql_00BPb2Uq_Zg/exec';

async function loadData() {
  try {
    const res = await fetch(API + '?action=getAll');
    const data = await res.json();
    renderHero(data.config, data.payments);
    renderHistory(data.payments);
  } catch(e) {
    document.getElementById('history-container').innerHTML =
      '<div class="empty">โหลดข้อมูลไม่สำเร็จ<br><small>กรุณาลองรีเฟรช</small></div>';
  }
}

// ─── Hero ─────────────────────────────────────────────────────
function renderHero(config, payments) {
  const total  = parseFloat(config?.total_debt) || 0;
  const paid   = (payments||[]).reduce((s,p) => s + parseFloat(p.amount||0), 0);
  const remain = Math.max(0, total - paid);
  const pct    = total > 0 ? Math.min(100, Math.round(paid/total*100)) : 0;

  // circle
  const C = 2 * Math.PI * 70;
  document.getElementById('circle-prog').style.strokeDashoffset = C - (pct/100)*C;
  document.getElementById('pct-text').textContent = pct + '%';

  // amounts
  document.getElementById('total-amount').textContent  = '฿' + total.toLocaleString('th-TH');
  document.getElementById('paid-amount').textContent   = '฿' + paid.toLocaleString('th-TH');
  document.getElementById('remain-amount').textContent = '฿' + remain.toLocaleString('th-TH');

  // names
  const creditor = config?.creditor_name || 'เจ้าหนี้';
  const debtor   = config?.debtor_name   || 'ลูกหนี้';
  document.getElementById('hero-names').innerHTML =
    `<strong>${escHtml(debtor)}</strong> ยืมเงิน <strong>${escHtml(creditor)}</strong>`;

  // last payment strip
  if (payments && payments.length > 0) {
    const last = payments[payments.length - 1];
    document.getElementById('last-payment').style.display = 'flex';
    document.getElementById('last-amount').textContent = '+฿' + parseFloat(last.amount).toLocaleString('th-TH');
    document.getElementById('last-date').textContent   = formatDate(last.date);
  }

  // footer
  const count = (payments||[]).length;
  document.getElementById('footer-note').textContent =
    count ? `ชำระมาแล้ว ${count} ครั้ง` : '';
}

// ─── History ──────────────────────────────────────────────────
function renderHistory(payments) {
  const el = document.getElementById('history-container');
  if (!payments || !payments.length) {
    el.innerHTML = '<div class="empty">ยังไม่มีการชำระ</div>';
    return;
  }

  // คำนวณ running total ย้อนหลัง
  let runningTotal = 0;
  const withRunning = payments.map(p => {
    runningTotal += parseFloat(p.amount||0);
    return { ...p, runningTotal };
  });

  el.innerHTML = [...withRunning].reverse().map((p, i) => {
    const id      = 'h' + i;
    const date    = formatDate(p.date);
    const hasSlip = !!p.slip_url;

    const slipBadge = hasSlip ? `<span class="badge-slip">📎 สลิป</span>` : '';
    const notePreview = p.note
      ? `<div class="h-note-preview">${escHtml(p.note)}</div>` : '';

    const detailNote = p.note
      ? `<div class="d-row"><span class="d-label">โน้ต</span><span class="d-value">${escHtml(p.note)}</span></div>`
      : '';

    const detailSlip = hasSlip
      ? `<div class="d-row" style="flex-direction:column">
           <img src="${escAttr(p.slip_url)}" class="slip-thumb" alt="สลิป"
             onclick="openLightbox('${escAttr(p.slip_url)}')"
             onerror="this.style.display='none'"/>
           <a href="${escAttr(p.slip_url)}" target="_blank" class="slip-link">🔗 เปิดสลิปในแท็บใหม่</a>
         </div>`
      : `<div class="d-row"><span class="d-label">สลิป</span><span class="d-value" style="color:var(--gray-400)">ไม่มีสลิป</span></div>`;

    return `
    <div class="history-item">
      <div class="history-summary" onclick="toggleDetail('${id}')">
        <div class="h-dot"></div>
        <div class="h-info">
          <div class="h-top">
            <span class="h-amount">+฿${parseFloat(p.amount).toLocaleString('th-TH')} ${slipBadge}</span>
            <span class="h-date">${date}</span>
          </div>
          ${notePreview}
          <div class="running-chip">รวมชำระแล้ว ฿${p.runningTotal.toLocaleString('th-TH')}</div>
        </div>
        <div class="h-chevron" id="chev-${id}">▼</div>
      </div>
      <div class="h-detail" id="${id}">
        <div class="d-row">
          <span class="d-label">วันที่</span>
          <span class="d-value">${date}</span>
        </div>
        <div class="d-row">
          <span class="d-label">ยอด</span>
          <span class="d-value" style="font-weight:600;color:var(--green-dark)">฿${parseFloat(p.amount).toLocaleString('th-TH')}</span>
        </div>
        <div class="d-row">
          <span class="d-label">รวมถึงตอนนี้</span>
          <span class="d-value" style="color:var(--green)">฿${p.runningTotal.toLocaleString('th-TH')}</span>
        </div>
        ${detailNote}
        ${detailSlip}
      </div>
    </div>`;
  }).join('');
}

function toggleDetail(id) {
  const detail = document.getElementById(id);
  const chev   = document.getElementById('chev-' + id);
  const open   = detail.classList.contains('open');
  detail.classList.toggle('open', !open);
  chev.classList.toggle('open', !open);
}

// ─── Lightbox ─────────────────────────────────────────────────
function openLightbox(url) {
  if (event) event.stopPropagation();
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// ─── Helpers ──────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('th-TH', {
      day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
  } catch(e) { return iso; }
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

loadData();
</script>
</body>
</html>
